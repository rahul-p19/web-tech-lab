<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Question 6</title>
    <style>
      a:link {
        color: green;
      }

      a:visited {
        color: orange;
      }

      a:hover {
        color: red;
      }

      a:active {
        color: purple;
      }
    </style>
  </head>
  <body>
    <h1 style="text-align: center">Different Font Styles</h1>
    <div
      style="display: flex; align-items: center; justify-content: space-around"
    >
      <p style="font-family: 'Times New Roman', Times, serif; font-size: 15px">
        Times New Roman
      </p>
      <p
        style="
          font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande',
            'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
          font-size: 30px;
          font-weight: 800;
          color: red;
        "
      >
        Lucida Sans
      </p>
    </div>
    <h1 style="text-align: center">Image Repetition</h1>
    <div
      style="
        display: flex;
        align-items: center;
        justify-content: space-around;
        gap: 50px;
      "
    >
      <div style="width: 40%">
        <p>No Repeat</p>
        <div
          style="
            width: 100%;
            height: 200px;
            background-image: url('sample.jpg');
            background-repeat: no-repeat;
            border: solid 1px red;
          "
        ></div>
      </div>
      <div style="width: 40%">
        <p>Repeat</p>
        <div
          style="
            width: 100%;
            height: 200px;
            background-image: url('sample.jpg');
            background-repeat: repeat;
            border: solid 1px red;
          "
        ></div>
      </div>
    </div>
    <h1 style="text-align: center">Link Styling</h1>
    <div
      style="
        display: flex;
        align-items: center;
        justify-content: space-around;
        gap: 50px;
      "
    >
      <a href="https://google.com">This is a link</a>
    </div>
  </body>
</html>
