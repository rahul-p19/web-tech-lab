<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question 5</title>
</head>
<body>
    <button onclick=displayDateAndTime()>Show date and time</button>
    <p id="dateTime"></p>
    <script>
        function displayDateAndTime(){
            const currentTime = new Date();
            const para = document.getElementById("dateTime");
            para.innerHTML = currentTime;
        }
    </script>
</body>
</html>
