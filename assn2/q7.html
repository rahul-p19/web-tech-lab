<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <button onclick=handleClick()>Click Me</button>
    <p id="para" style="display: block;">Lorem ipsum dolor sit amet consectetur, adipisicing elit. Aliquam culpa atque nesciunt rem. Quam quae
        nobis ipsum, magnam tenetur omnis!</p>
    <script>
        function handleClick() {
            const para = document.getElementById("para");
            if(para.style.display === "block") para.style.display = "none";
            else para.style.display = "block";
        }
    </script>
</body>

</html>
