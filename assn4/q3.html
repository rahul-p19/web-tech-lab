<!DOCTYPE html>
<html>
  <head>
    <title>Calculator with History</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h2>Simple Calculator</h2>

      <input type="number" id="num1" placeholder="Enter first number" />
      <input type="number" id="num2" placeholder="Enter second number" />

      <div class="buttons" style="margin-top: 15px;">
        <button onclick="calculate('add')">Add</button>
        <button onclick="calculate('subtract')">Subtract</button>
        <button onclick="calculate('multiply')">Multiply</button>
        <button onclick="calculate('divide')">Divide</button>
      </div>

      <h3 id="result"></h3>

      <h3>Last 5 Calculations:</h3>
      <ul id="historyList"></ul>
    </div>

    <script>
      const history = [];

      function operatorSymbol(operator){
        switch(operator){
          case "add":
            return "+";
          case "subtract":
            return "-";
          case "multiply":
            return "*";
          case "divide":
            return "/";
        }
      }

      function calculate(operator) {
        const num1 = parseFloat(document.getElementById("num1").value);
        const num2 = parseFloat(document.getElementById("num2").value);
        let result;

        if (isNaN(num1) || isNaN(num2)) {
          document.getElementById("result").textContent = "Enter valid numbers";
          return;
        }

        switch (operator) {
          case "add":
            result = num1 + num2;
            break;
          case "subtract":
            result = num1 - num2;
            break;
          case "multiply":
            result = num1 * num2;
            break;
          case "divide":
            if (num2 === 0) {
              document.getElementById("result").textContent =
                "Cannot divide by zero";
              return;
            }
            result = num1 / num2;
            break;
        }

        document.getElementById("result").textContent = "Result: " + result;

        // Save calculation in array
        const calculation = `${num1} ${operatorSymbol(operator)} ${num2} = ${result}`;
        history.unshift(calculation);

        // Keep only last 5
        if (history.length > 5) {
          history.pop();
        }

        updateHistory();
      }

      function updateHistory() {
        const historyList = document.getElementById("historyList");
        historyList.innerHTML = "";

        history.forEach((item) => {
          const li = document.createElement("li");
          li.textContent = item;
          historyList.appendChild(li);
        });
      }
    </script>
  </body>
</html>
