<!DOCTYPE html>
<html>
<head>
    <title>Quiz Application</title>
</head>
<body>

    <div class="container">
        <h2>Simple Quiz</h2>

        <div id="quizBox">
            <h3 id="question"></h3>

            <div id="options" style="width: 30%; margin-bottom: 10px; display: flex; flex-direction: column; gap: 5px;"></div>

            <p id="selectedOption"></p>
            <button onclick="nextQuestion()">Next</button>
        </div>

        <h3 id="result"></h3>
    </div>

    <script src="script.js"></script>
</body>
</html>
